name: Daily puzzle

# Generates today's edition (ET) and pushes it; Vercel auto-deploys on push.
# Two cron times so it fires just after midnight ET in both EDT and EST.
on:
  schedule:
    - cron: "5 4 * * *"   # 04:05 UTC → 00:05 ET during EDT (summer)
    - cron: "5 5 * * *"   # 05:05 UTC → 00:05 ET during EST (winter)
  workflow_dispatch: {}    # allow manual runs from the Actions tab

permissions:
  contents: write          # needed to push the generated puzzle

concurrency:
  group: daily-puzzle
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ensure timezone data (for zoneinfo)
        run: python -m pip install --quiet tzdata

      - name: Check required secrets are present
        env:
          NYT_API_KEY: ${{ secrets.NYT_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          missing=0
          if [ -z "${NYT_API_KEY:-}" ]; then echo "::error::Repository secret NYT_API_KEY is not set."; missing=1; fi
          if [ -z "${GROQ_API_KEY:-}" ]; then echo "::error::Repository secret GROQ_API_KEY is not set."; missing=1; fi
          if [ "$missing" = "1" ]; then
            echo "Add them under Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi
          echo "Both secrets are present."

      - name: Generate today's edition (skip if it already exists)
        env:
          NYT_API_KEY: ${{ secrets.NYT_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          set -euo pipefail
          DATE=$(TZ=America/New_York date +%F)
          if [ -f "web/puzzles/$DATE.json" ]; then
            echo "Edition for $DATE already exists — nothing to do."
            exit 0
          fi
          echo "Generating edition for $DATE"
          python -m pipeline.build

      - name: Commit & push if a new edition was created
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain web/puzzles data)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          DATE=$(TZ=America/New_York date +%F)
          git config user.name "times-search-bot"
          git config user.email "actions@users.noreply.github.com"
          git add web/puzzles data
          git commit -m "Daily edition: $DATE"
          git push origin HEAD:main
