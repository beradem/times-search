<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Times Search">
  <!-- thin circular emblem, line-art aesthetic -->
  <circle cx="32" cy="32" r="29" fill="#f7f3e9" stroke="#1a1712" stroke-width="1.6" />
  <!-- faint inner arc, like a hand-drawn double line near the top -->
  <path d="M16 18 A 22 22 0 0 1 48 18" fill="none" stroke="#1a1712" stroke-width="0.7" opacity="0.5" />
  <!-- TS monogram in an elegant italic serif -->
  <text x="32" y="43.5" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-style="italic"
        font-weight="500" font-size="29" letter-spacing="-1" fill="#1a1712">TS</text>
</svg>
