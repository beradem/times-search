<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paper Guessr</title>
  <meta name="description" content="Test your touch on history. Date four real New York Times front pages and guess the month and year they ran." />

  <!-- Link preview (Open Graph + Twitter). Absolute URLs required by scrapers.
       Canonical domain is paperguessr.com (add it in the Vercel project). -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Paper Guessr" />
  <meta property="og:url" content="https://paperguessr.com/" />
  <meta property="og:title" content="Paper Guessr — test your touch on history" />
  <meta property="og:description" content="Date four real New York Times front pages and guess when they ran. A daily history game." />
  <meta property="og:image" content="https://paperguessr.com/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Paper Guessr — test your touch on history" />
  <meta name="twitter:description" content="Date four real New York Times front pages and guess when they ran." />
  <meta name="twitter:image" content="https://paperguessr.com/og.png" />
  <meta name="theme-color" content="#f4efe2" />

  <link rel="icon" type="image/png" sizes="32x32" href="icon-32.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <link rel="apple-touch-icon" href="icon-180.png" />

  <style>
    /* header logo (kept here to avoid touching styles.css) */
    .brand { display: inline-flex; align-items: center; }
    .brand img { height: 32px; width: auto; display: block; }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="masthead">
    <div class="masthead-inner">
      <a class="brand" href="./" aria-label="Paper Guessr — home">
        <img src="icon-512.png" alt="Paper Guessr" />
      </a>
      <div class="scoreboard" id="scoreboard" hidden>
        <span class="round-pill" id="round-pill"></span>
        <span class="score-pill">Score <strong id="score-total">0</strong></span>
      </div>
    </div>
  </header>

  <main id="app" aria-live="polite"><!-- screens render here --></main>

  <footer class="colophon">
    All the News That&rsquo;s Fit to Guess · stories from the
    <span>New York Times</span> Archive
  </footer>

  <script src="scoring.js"></script>
  <script src="app.js"></script>
  <!-- Vercel Web Analytics (visitor counts). Active once enabled in the
       Vercel dashboard → Analytics. -->
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
