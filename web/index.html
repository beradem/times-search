<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Times Search</title>
  <meta name="description" content="Test your touch on history. Date four real New York Times front pages and guess the month and year they ran." />

  <!-- Link preview (Open Graph + Twitter). Absolute URLs required by scrapers.
       Update the domain here if/when the custom domain goes live. -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Times Search" />
  <meta property="og:url" content="https://times-search.vercel.app/" />
  <meta property="og:title" content="Times Search — test your touch on history" />
  <meta property="og:description" content="Date four real New York Times front pages and guess when they ran. A daily history game." />
  <meta property="og:image" content="https://times-search.vercel.app/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Times Search — test your touch on history" />
  <meta name="twitter:description" content="Date four real New York Times front pages and guess when they ran." />
  <meta name="twitter:image" content="https://times-search.vercel.app/og.png" />
  <meta name="theme-color" content="#f4efe2" />

  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="favicon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="masthead">
    <div class="masthead-inner">
      <a class="wordmark" href="./">Times Search</a>
      <div class="scoreboard" id="scoreboard" hidden>
        <span class="round-pill" id="round-pill"></span>
        <span class="score-pill">Score <strong id="score-total">0</strong></span>
      </div>
    </div>
  </header>

  <main id="app" aria-live="polite"><!-- screens render here --></main>

  <footer class="colophon">
    All the News That&rsquo;s Fit to Guess · stories from the
    <span>New York Times</span> Archive
  </footer>

  <script src="scoring.js"></script>
  <script src="app.js"></script>
  <!-- Vercel Web Analytics (visitor counts). Active once enabled in the
       Vercel dashboard → Analytics. -->
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
